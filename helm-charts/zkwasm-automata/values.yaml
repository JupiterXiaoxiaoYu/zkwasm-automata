# Default values for zkwasm-automata
replicaCount: 1

image:
  repository: ghcr.io/jupiterxiaoxiaoyu/zkwasm-automata
  pullPolicy: Always
  tag: "latest"  # 可以是 latest 或 MD5 值

# 添加 ingress 配置
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # TLS 配置
  tls:
    enabled: true
  # 域名配置
  domain:
    base: "zkwasm.ai"
    prefix: "rpc"  # 生成 rpc.namespace.zkwasm.ai
  # CORS 配置
  cors:
    enabled: true
    allowOrigins: "*"
    allowMethods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    allowHeaders: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    allowCredentials: "true"
    maxAge: "1728000"

# 应用配置
config:
  app:
    deploy: "TRUE"
    remote: "TRUE"
    autoSubmit: "TRUE"
    image: "3DA9EA63C95667EF0AAE3F2E48B9C705"
    migrate: "FALSE"
    settlementContractAddress: "0x48129238Be8aF277433662711d86e6cF235118D3"
    rpcProvider: "https://rpc.zklab.dev/v1/3c8b3bdd25134d519139db98ff0755da83f04f5130795a89c18a254f2288a9c7"
  mongodb:
    enabled: true
    image:
      repository: mongo
      tag: latest
    port: 27017
    persistence:
      enabled: true
      storageClassName: csi-disk  
      size: 10Gi
  redis:
    enabled: true
    image:
      repository: redis
      tag: 7.4.2
    port: 6379
    resources:
      requests:
        memory: "2Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "1000m"
  merkle:
    enabled: true
    image:
      repository: sinka2022/zkwasm-merkleservice
      tag: v1
    port: 3030

service:
  type: ClusterIP
  port: 3000

# 初始化容器配置
initContainer:
  enabled: true
  image: node:18-slim

resources:
  limits:
    cpu: 1000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 2Gi

nodeSelector: {}
tolerations: []
affinity: {}
